name: Protect Stable

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Check JS syntax
        run: |
          node --check index.html 2>/dev/null || true
          python3 << 'PYEOF'
          import re, subprocess, sys
          with open('index.html') as f: c=f.read()
          scripts = re.findall(r'<script>(.*?)</script>', c, re.DOTALL)
          js='\n'.join(scripts)
          with open('/tmp/check.js','w') as f: f.write(js)
          r=subprocess.run(['node','--check','/tmp/check.js'],capture_output=True,text=True)
          if r.returncode!=0:
            print('SYNTAX ERROR:', r.stdout)
            sys.exit(1)
          critical=['doLogin','bootApp','checkSession','sbPatchUser','loadAllUsers','toast','renderSidebar']
          missing=[fn for fn in critical if f'function {fn}' not in c and f'async function {fn}' not in c]
          if missing:
            print('MISSING FUNCTIONS:', missing)
            sys.exit(1)
          print('✅ Validation passed')
          PYEOF
          
      - name: Update stable branch
        if: success()
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git fetch origin stable || git checkout -b stable
          git checkout stable
          git merge main --no-edit
          git push origin stable
